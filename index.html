<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Pro</title>

    <!-- PWA -->
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Memory Pro">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="tab-bar" class="tab-bar"></div>
    <div id="main-view"></div>

    <div class="toolbar">
        <button onclick="UI.openModal('settingsModal')" class="btn-circle">⚙️</button>
        <button onclick="App.mixNote()" class="btn-circle btn-mix">🎲</button>
        <button onclick="Cards.revealConsonants()" class="btn-circle" style="border-color: var(--primary);">👁️‍🗨️</button>
        <button onclick="Cards.revealStep()" class="btn-circle btn-big">👁️</button>
        <button onclick="Cards.toggleAll()" class="btn-circle">📢</button>
        <button onclick="UI.openModal('addModal')" class="btn-circle btn-add">+</button>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <button class="btn-close-top" onclick="UI.closeModal('settingsModal')">✕</button>
            <h3 style="text-align: center; margin-top: 0;">Tùy chọn</h3>
            <div class="settings-grid">
                <div id="tts-btn" class="setting-item" onclick="App.toggleTTS()">
                    <div style="font-size: 24px;">🔊</div>
                    <div id="tts-label" style="font-size: 12px; margin-top: 5px;">Âm thanh (Tab)</div>
                </div>
                <div class="setting-item" onclick="App.exportData()">
                    <div style="font-size: 24px;">💾</div>
                    <div style="font-size: 12px; margin-top: 5px;">Xuất file</div>
                </div>
                <div class="setting-item" style="grid-column: span 2; position: relative; overflow: hidden;">
                    <input type="file" id="importFile" onchange="App.importData()" style="position: absolute; opacity: 0; inset: 0; cursor: pointer;">
                    <div style="font-size: 24px;">📂</div>
                    <div style="font-size: 12px; margin-top: 5px;">Nhập file (JSON)</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <button class="btn-close-top" onclick="UI.closeModal('addModal')">✕</button>
            <h3 style="margin-top: 0;">Thêm thẻ</h3>
            <textarea id="addText" rows="4" placeholder="Nội dung [ẩn|gợi ý]..."></textarea>
            <div id="quick-tabs-list"></div>
            <input type="text" id="addCat" placeholder="Tên Tab">
            <input type="number" id="addPrio" value="5">
            <div class="modal-action-bar" style="justify-content: flex-end;">
                <button onclick="App.saveNewNote()" class="btn-icon-round btn-save-icon">✔</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <button class="btn-close-top" onclick="UI.closeModal('editModal')">✕</button>
            <h3 style="margin-top: 0;">Sửa thẻ</h3>
            <textarea id="editText" rows="4"></textarea>
            <div id="edit-quick-tabs-list"></div>
            <input type="text" id="editCat">
            <input type="number" id="editPrio">
            <div class="modal-action-bar">
                <button onclick="App.deleteNote()" class="btn-icon-round btn-del-icon">🗑</button>
                <button onclick="App.updateNote()" class="btn-icon-round btn-save-icon">✔</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/dexie@3/dist/dexie.js"></script>
    <script src="js/tts.js"></script>
    <script src="js/db.js"></script>
    <script src="js/cards.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
